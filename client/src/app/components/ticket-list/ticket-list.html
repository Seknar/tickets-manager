<style>
    table {
        width: 100%;
        border-collapse: collapse;
        text-align: center;
    }
    
    th, td {
        border: 1px solid var(--gray-200);
        padding: 0.5rem;
        min-width: 10%;
        max-width: 10%;
    }
    
    th {
        background-color: var(--gray-400);
        color: var(--gray-700);
    }
</style>


<table>
  <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Customer Name</th>
        <th>Status</th>
        <th>Priority</th>
        <th>Created at</th>
    </tr>
  </thead>
  <tbody>
    @for (ticket of tickets(); track ticket.id) {
        <tr>
            <td>{{ticket.id}}</td>
            <td>{{ticket.title}}</td>
            <td>{{ticket.description}}</td>
            <td>{{ticket.customerName}}</td>
            <td>{{ticket.status}}</td>
            <td>{{ticket.priority}}</td>
            <td>{{ticket.createdAt}}</td>
        </tr>
    } @empty {
        <tr>
            <td colspan="7">No tickets found</td>
        </tr>
    }
  </tbody>
</table>
